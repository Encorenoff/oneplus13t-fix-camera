name: "Update Module"

on:
    workflow_dispatch:
        inputs:
            oos_version:
                description: "Target OOS Version (e.g., CPH2723_16.0.1.303)"
                required: true
            version_suffix:
                description: "Optional Suffix (e.g., _v2)."
                required: false
                default: ""
            oos_ota_url:
                description: "Source OOS Full OTA URL"
                required: true
            cos_version:
                description: "Source COS Version (e.g., PKX110_16.0.1.301)"
                required: true
            cos_ota_url:
                description: "Source COS Full OTA URL"
                required: true

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Initialize required files
              run: |
                  [ -f .github/logs/ota_history.yml ] || echo "[]" > .github/logs/ota_history.yml
                  [ -f update.json ] || echo '{}' > update.json
                  [ -f changelog.md ] || touch changelog.md

            - name: Set release tag 
              run: |
                  FULL_TAG="${{ inputs.oos_version }}${{ inputs.version_suffix }}"
                  echo "RELEASE_TAG=$FULL_TAG" >> $GITHUB_ENV
                  echo "Target Release Tag: $FULL_TAG"

            - name: Check if tag exists
              id: check_tag
              run: |
                  if git ls-remote --tags origin | grep -q "refs/tags/${{ env.RELEASE_TAG }}$"; then
                    echo "SKIPPING: Tag ${{ env.RELEASE_TAG }} already exists."
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "OK: Tag ${{ env.RELEASE_TAG }} is new."
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Prepare Environment
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  cleanup_disk() {
                      echo "Cleaning up disk space..."
                      sudo rm -rf /usr/share/dotnet
                      sudo rm -rf /opt/ghc
                      sudo rm -rf /usr/local/lib/android
                      sudo rm -rf "/usr/local/share/boost"
                      sudo rm -rf "$AGENT_TOOLSDIRECTORY"
                      sudo systemctl stop docker || true
                      sudo rm -rf /var/lib/docker
                      sudo rm -rf /usr/share/docker-desktop
                      echo "Disk cleanup completed"
                      df -h
                  }

                  download_otas() {
                      echo "Starting OTA downloads..."
                      mkdir -p OTA_zip

                      aria2c -x16 -s16 -k1M --file-allocation=none -c -d OTA_zip -o "oos.zip" "${{ inputs.oos_ota_url }}" &
                      PID_OOS=$!
                      
                      aria2c -x16 -s16 -k1M --file-allocation=none -c -d OTA_zip -o "cos.zip" "${{ inputs.cos_ota_url }}" &
                      PID_COS=$!
                      
                      wait $PID_OOS
                      if [ $? -ne 0 ]; then echo "OOS Download failed!"; exit 1; fi
                      
                      wait $PID_COS
                      if [ $? -ne 0 ]; then echo "COS Download failed!"; exit 1; fi
                      
                      echo "Downloads completed"
                  }

                  cleanup_disk &
                  CLEANUP_PID=$!
                  download_otas
                  
                  wait $CLEANUP_PID
                  echo "Environment preparation completed"
                  ls -lh OTA_zip/
                  df -h

            - name: Calculate version code
              if: steps.check_tag.outputs.exists == 'false'
              id: versioning
              run: |
                  current_code=$(jq -r '.versionCode // 0' update.json)
                  
                  if ! [[ "$current_code" =~ ^[0-9]+$ ]] || [[ "$current_code" == "0" ]]; then
                    current_code=0
                    echo "First run, using : $current_code"
                  fi
                  
                  new_code=$((current_code + 1))
                  
                  echo "Version code: $current_code → $new_code"
                  echo "new_code=$new_code" >> $GITHUB_OUTPUT

            - name: Install dependencies
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  echo "Installing system packages..."
                  sudo apt update
                  sudo apt install -y \
                    jq aria2 erofs-utils erofsfuse \
                    brotli lz4 xz-utils unzip zip

                  echo "Installing yq..."
                  sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                  sudo chmod +x /usr/local/bin/yq

                  echo "Installing payload-dumper-go..."
                  PD_URL="https://github.com/ssut/payload-dumper-go/releases/download/1.3.0/payload-dumper-go_1.3.0_linux_amd64.tar.gz"
                  curl -sL "$PD_URL" -o dumper.tar.gz
                  tar -xzf dumper.tar.gz
                  sudo mv payload-dumper-go /usr/local/bin/payload-dumper-go
                  rm dumper.tar.gz
                  
                  echo "Dependencies installed"

            - name: Setup extraction paths
              if: steps.check_tag.outputs.exists == 'false'
              id: setup_paths
              run: |
                  WORK_DIR=$(mktemp -d -t odmwork.XXXXXX)
                  MOUNT_POINT="${WORK_DIR}/erofs_mount"

                  echo "WORK_DIR=${WORK_DIR}" >> $GITHUB_ENV
                  echo "MOUNT_POINT=${MOUNT_POINT}" >> $GITHUB_ENV

            - name: Extract ODM images
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  source .github/scripts/extract_odm_lib.sh
                  
                  WORK_DIR="${{ env.WORK_DIR }}"
                  
                  extract_and_clean "OTA_zip/oos.zip" "odm_oos.img" "$WORK_DIR"
                  extract_and_clean "OTA_zip/cos.zip" "odm_cos.img" "$WORK_DIR"

                  echo "odm_img_path=$WORK_DIR/odm_cos.img" >> $GITHUB_ENV

            - name: Update ODM files
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  source .github/scripts/extract_odm_lib.sh
                  
                  MOUNT_POINT="${{ env.MOUNT_POINT }}"
                  REPO_ODM_ROOT="module/odm"
                  
                  HISTORY_FILE=".github/logs/odm_changes.md
                  CURRENT_REPORT="current_report.txt"
                  
                  mount_odm "${{ env.odm_img_path }}" "$MOUNT_POINT"
                  
                  {
                    echo "## Update: ${{ env.RELEASE_TAG }}"
                    echo "- **Date:** $(date)"
                    echo "- **Source COS:** ${{ inputs.cos_version }}"
                    echo "- **Changes:**"
                    echo '```diff'
                  } > "$CURRENT_REPORT"
                  
                  find "$REPO_ODM_ROOT" -type f | sort | while read -r LOCAL_FILE; do
                    
                    REL_PATH="${LOCAL_FILE#$REPO_ODM_ROOT/}"
                    SOURCE_FILE="$MOUNT_POINT/$REL_PATH"
                    
                    if [ -a "$SOURCE_FILE" ] || [ -L "$SOURCE_FILE" ]; then
                        if ! cmp -s "$LOCAL_FILE" "$SOURCE_FILE" 2>/dev/null; then
                            cp -Pf "$SOURCE_FILE" "$LOCAL_FILE"
                            echo "! [UPDATED]   $REL_PATH" >> "$CURRENT_REPORT"
                        fi
                    else
                        echo "- [MISSING]   $REL_PATH" >> "$CURRENT_REPORT"
                    fi
                  done
                  
                  echo '```' >> "$CURRENT_REPORT"
                  echo "" >> "$CURRENT_REPORT"
                  
                  touch "$HISTORY_FILE"
                  
                  cat "$CURRENT_REPORT" "$HISTORY_FILE" > temp
                  mv temp "$HISTORY_FILE"
                  echo "History updated"

                  
                  cat "$CURRENT_REPORT"
                  
                  unmount_odm "$MOUNT_POINT"

            - name: Cleanup temporary files
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  echo "Cleaning up temporary files..."
                  rm -rf "${{ env.WORK_DIR }}" OTA_zip
                  echo "Cleanup completed"

            - name: Update module.prop
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  sed -i "s/^version=.*/version=${{ env.RELEASE_TAG }}/" module/module.prop
                  sed -i "s/^versionCode=.*/versionCode=${{ steps.versioning.outputs.new_code }}/" module/module.prop
                  if ! grep -q "^versionCode=" module/module.prop; then
                    echo "versionCode=${{ steps.versioning.outputs.new_code }}" >> module/module.prop
                  fi

            - name: Update update.json
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  ver="${{ env.RELEASE_TAG }}"
                  zip_url="https://github.com/kinginu/oneplus13t-fix-camera/releases/download/${ver}/oneplus13t-fix-camera-${ver}.zip"
                  jq \
                    --arg ver "$ver" \
                    --arg code "${{ steps.versioning.outputs.new_code }}" \
                    --arg url "$zip_url" \
                    '.version = $ver | .versionCode = ($code | tonumber) | .zipUrl = $url' \
                    update.json > tmp.json && mv tmp.json update.json

            - name: Update changelog.md
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  changelog_line="* Update ODM blobs from COS: ${{ inputs.cos_version }}"
                  
                  {
                    echo "## ${{ env.RELEASE_TAG }} ($(date +'%Y-%m-%d'))"
                    echo
                    printf "%s\n" "$changelog_line"
                    echo
                  } > new_entry.txt
                  cat new_entry.txt changelog.md > temp && mv temp changelog.md
            
            - name: Commit changes
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git add module/module.prop update.json changelog.md module/odm .github/logs/odm_changes.md
                  git commit -m "feat: update ODM for ${{ env.RELEASE_TAG }}"
                  git push

            - name: Create tag
              if: steps.check_tag.outputs.exists == 'false'
              run: |
                  git tag ${{ env.RELEASE_TAG }}
                  git push origin ${{ env.RELEASE_TAG }}

            - name: Build module ZIP
              if: steps.check_tag.outputs.exists == 'false'
              id: build_zip
              run: |
                  ver="${{ env.RELEASE_TAG }}"
                  zip_name="oneplus13t-fix-camera-${ver}.zip"
                  (cd module && zip -r9 "../${zip_name}" .)
                  echo "zip_name=${zip_name}" >> $GITHUB_OUTPUT

            - name: Prepare release notes
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  RELEASE_TAG: ${{ env.RELEASE_TAG }}
                  COS_VERSION: ${{ inputs.cos_version }}
              run: |
                  changelog_line="* Update ODM blobs from COS: $COS_VERSION"

                  {
                    echo "## Changelog"
                    echo
                    printf "%s\n" "$changelog_line"
                    echo
                    echo "---"
                    echo "### Build Info"
                    echo "- **Target Version:** \`$RELEASE_TAG\`"
                    echo "- **Source COS Version:** \`$COS_VERSION\`"
                  } > RELEASE_BODY.md

            - name: Create release
              if: steps.check_tag.outputs.exists == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  name: "Module for ${{ env.RELEASE_TAG }}"
                  files: |
                    ${{ steps.build_zip.outputs.zip_name }}
                  body_path: RELEASE_BODY.md
                  fail_on_unmatched_files: true

            - name: Update OTA history
              if: steps.check_tag.outputs.exists == 'false'
              env:
                  TAG_VER: ${{ env.RELEASE_TAG }}
                  COS_VER: ${{ inputs.cos_version }}
              run: |
                  source .github/scripts/extract_odm_lib.sh
                  echo "Updating OTA history..."
                  export TS=$(date -u --iso-8601=seconds)
                    
                  yq -i '. += [{
                    "oos_version": env(TAG_VER),
                    "cos_version": env(COS_VER),
                    "processed_at": env(TS)
                  }]' .github/logs/ota_history.yml
                    
                  git add .github/logs/ota_history.yml
                  git commit -m "chore: update OTA history for ${{ env.RELEASE_TAG }} [skip ci]"
                  git push
                    
                  echo "OTA history updated"
